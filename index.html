<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f3f5f9; --card:#ffffff; --ink:#14161e; --mut:#6b7280; --bd:#e7eaf1;
    --shadow:0 10px 30px rgba(20,23,40,.07); --shadow-h:0 18px 42px rgba(20,23,40,.14);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:
        radial-gradient(900px 480px at 88% -8%, #eaf0fb 0%, transparent 60%),
        radial-gradient(820px 460px at 0% 0%, #fdeef0 0%, transparent 55%),
        var(--bg);
       color:var(--ink);font-family:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
       -webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  .center{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .wrap{max-width:1080px;margin:0 auto;padding:28px 20px 60px}

  /* Login */
  .login{width:100%;max-width:400px;background:var(--card);border-radius:26px;padding:36px 30px;box-shadow:var(--shadow);text-align:center}
  .login .logo{height:60px;margin:0 auto 18px;display:block}
  .login h1{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:0 0 4px}
  .login .p{color:var(--mut);font-size:13.5px;margin:0 0 22px}
  .inp{width:100%;padding:13px 16px;margin:8px 0;border-radius:14px;border:1.5px solid var(--bd);background:#fbfcfe;font-size:15px;font-family:inherit;color:var(--ink);transition:border-color .15s,box-shadow .15s}
  .inp:focus{outline:none;border-color:#b9c0d0;box-shadow:0 0 0 4px rgba(120,130,160,.10)}
  .btn{width:100%;padding:13px;border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;font-family:inherit;
       background:linear-gradient(135deg,#37425f,#1d2436);box-shadow:0 10px 22px rgba(29,36,54,.26);transition:transform .08s,filter .15s}
  .btn:hover{filter:brightness(1.08)} .btn:active{transform:translateY(1px)} .btn:disabled{opacity:.6;cursor:default}
  .erro{font-size:13px;min-height:18px;margin-top:10px;color:#dc2626}
  .link{color:var(--mut);font-size:13px;cursor:pointer;margin-top:16px;display:inline-block}
  .link:hover{color:var(--ink)}

  /* Cabeçalho */
  .top{display:flex;align-items:center;gap:9px;margin-bottom:28px}
  .top .brand{height:30px}
  .top .brandtx{font-weight:800;font-size:18px;letter-spacing:-.01em;color:var(--ink)}
  .top .who{margin-left:auto;text-align:right;font-size:12.5px;color:var(--mut);line-height:1.35}
  .top .who b{color:var(--ink);font-weight:700;display:block;font-size:13px}
  .ghost{background:#fff;border:1.5px solid var(--bd);color:var(--ink);padding:9px 15px;border-radius:13px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:border-color .15s,background .15s}
  .ghost:hover{border-color:#c4cad8;background:#fafbfd}
  .h2{font-size:25px;font-weight:800;letter-spacing:-.025em;margin:4px 0 4px}
  .sub{color:var(--mut);font-size:14.5px;margin:0 0 28px}

  /* Frentes */
  .frentes{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:20px}
  .frente{position:relative;border-radius:26px;padding:26px;cursor:pointer;color:#fff;overflow:hidden;min-height:210px;
          display:flex;flex-direction:column;box-shadow:var(--shadow);transition:transform .14s,box-shadow .14s}
  .frente:hover{transform:translateY(-5px);box-shadow:var(--shadow-h)}
  .frente::after{content:"";position:absolute;right:-40px;top:-40px;width:170px;height:170px;border-radius:50%;background:rgba(255,255,255,.10)}
  .frente .lgwrap{background:#fff;border-radius:14px;padding:11px 16px;width:fit-content;box-shadow:0 6px 16px rgba(0,0,0,.12)}
  .frente .lgwrap img{height:42px;display:block}
  .frente .spacer{flex:1}
  .frente h3{font-size:23px;font-weight:800;letter-spacing:-.02em;margin:0 0 3px;position:relative}
  .frente p{font-size:13.5px;opacity:.95;margin:0;position:relative}
  .frente .go{position:absolute;bottom:24px;right:24px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.22);
              display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;transition:background .15s}
  .frente:hover .go{background:rgba(255,255,255,.34)}

  /* Voltar */
  .backbar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .pill{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#fff;padding:7px 14px;border-radius:999px}

  /* Módulos */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:16px}
  .mod{background:var(--card);border:1.5px solid var(--bd);border-radius:20px;padding:20px;display:flex;flex-direction:column;gap:7px;cursor:pointer;transition:transform .1s,box-shadow .12s,border-color .12s}

  /* ---------- LOGIN ---------- */
  function telaLogin(msgErro) {
    app.innerHTML = "";
    app.appendChild(el(
      '<div class="center"><div class="login">' +
        '<img class="logo" src="'+LOGO_IMOB+'" />' +
        '<h1>Portal Inerente</h1>' +
        '<div class="p">Entre com seu CPF e senha</div>' +
        '<input id="ident" class="inp" type="text" inputmode="text" placeholder="CPF" autocomplete="username" />' +
        '<input id="senha" class="inp" type="password" placeholder="sua senha" autocomplete="current-password" />' +
        '<button id="entrar" class="btn">Entrar</button>' +
        '<div class="erro" id="erro">'+(msgErro||"")+'</div>' +
        '<span class="link" id="reset">Esqueci minha senha</span>' +
      '</div></div>'
    ));
    const $=(id)=>document.getElementById(id);
    const resolverEmail = async (ident) => {
      ident = (ident || "").trim();
      if (!ident) return null;
      if (ident.indexOf("@") >= 0) return ident.toLowerCase(); // digitou e-mail (reserva)
      try {
        const { data, error } = await sb.rpc("email_por_cpf", { _cpf: ident });
        if (error) return null;
        return data || null;
      } catch (e) { return null; }
    };
    const entrar = async () => {
      const ident=$("ident").value.trim(), senha=$("senha").value;
      $("erro").style.color="#dc2626"; $("erro").textContent="";
      if(!ident||!senha){$("erro").textContent="Preencha CPF e senha.";return;}
      $("entrar").disabled=true; $("entrar").textContent="Entrando...";
      const email = await resolverEmail(ident);
      if(!email){$("erro").textContent="CPF não encontrado. Confira o número.";$("entrar").disabled=false;$("entrar").textContent="Entrar";return;}
      const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
      if(error){$("erro").textContent="CPF ou senha incorretos.";$("entrar").disabled=false;$("entrar").textContent="Entrar";return;}
      await carregarPerfil(data.user);
    };
    $("entrar").onclick=entrar;
    $("senha").addEventListener("keydown",(e)=>{if(e.key==="Enter")entrar();});
    $("reset").onclick=async()=>{
      const ident=$("ident").value.trim();
      $("erro").style.color="#dc2626";
      if(!ident){$("erro").textContent="Digite seu CPF e clique aqui.";return;}
      const email = await resolverEmail(ident);
      if(!email){$("erro").textContent="CPF não encontrado.";return;}
      await sb.auth.resetPasswordForEmail(email);
      $("erro").style.color="#16a34a"; $("erro").textContent="Link de redefinição enviado pro seu e-mail.";
    };
  }

  async function carregarPerfil(user) {
    let aprovado=true, role="corretor";
    try{
      const { data:p } = await sb.from("perfis").select("aprovado, role, is_diretor").eq("id",user.id).single();
      if(p){ aprovado=p.aprovado!==false; role=(p.role||"corretor").toLowerCase(); if(p.is_diretor===true) role="diretor"; }
    }catch(e){}
    if(!aprovado){ await sb.auth.signOut(); telaLogin("Seu acesso ainda não foi aprovado pelo gerente."); return; }
    let adm=false;
    try{ const { data:a } = await sb.rpc("sou_adm"); adm = (a===true); }catch(e){}
    perfil={ role, email:user.email, adm };
    // Pre-warming do backend (acorda o Railway se estiver dormindo)
    // Não bloqueia a UI: dispara o fetch e segue.
    try { fetch('https://agentes-de-whatsapp-production.up.railway.app/grupos/status', { method: 'GET' }).catch(()=>{}); } catch(e) {}
    if(_abrirVendaId) telaSecretaria(); else telaFrentes();
  }

      NIVEIS.forEach(n=>{ const o=document.createElement("option"); o.value=n[0]; o.textContent=n[1]; if((perm[m[0]]||"nenhum")===n[0]) o.selected=true; sel.appendChild(o); });

          const { error } = await sb.from("perfis_acesso").insert(Object.assign({ id:p.id, gerencia_pessoas:false, ordem:p.ordem }, payload));

          const { error } = await sb.from("perfis_acesso").update(payload).eq("id", p.id);

    };

          c=el('<a class="mod" href="#" style="cursor:pointer">'+inner+'</a>');
          c.onclick=async (ev)=>{
            ev.preventDefault();
            const aba=window.open('about:blank','_blank');
            try{
              const { data:sess } = await sb.auth.getSession();
              const at = sess && sess.session ? sess.session.access_token : null;
              const rt = sess && sess.session ? sess.session.refresh_token : null;
              if(!at || !rt){ if(aba) aba.location=m.url; return; }
              const sep=m.url.indexOf('?')>=0?'&':'?';
              if(aba) aba.location=m.url+sep+'jwt='+encodeURIComponent(at)+'&refresh='+encodeURIComponent(rt);
            }catch(e){ if(aba) aba.location=m.url; }
          };
        } else if(m.ssojwt){
          // Card que passa o JWT do Supabase direto (módulo de pessoas valida quem é o diretor).
          c=el('<a class="mod" href="#" style="cursor:pointer">'+inner+'</a>');
          c.onclick=async (ev)=>{
            ev.preventDefault();
            const aba=window.open('about:blank','_blank');
            try{
              const { data:sess } = await sb.auth.getSession();
              const jwt = sess && sess.session ? sess.session.access_token : null;
              if(!jwt){ if(aba) aba.location=m.url; return; }
              const sep=m.url.indexOf('?')>=0?'&':'?';
              if(aba) aba.location=m.url+sep+'jwt='+encodeURIComponent(jwt);
            }catch(e){ if(aba) aba.location=m.url; }
          };
        } else if(m.sso){
          // Card com SSO: clica → gera token no backend usando JWT do Supabase → abre com ?sso=
          c=el('<a class="mod" href="#" style="cursor:pointer">'+inner+'</a>');
          c.onclick=async (ev)=>{
            ev.preventDefault();
            const aba=window.open('about:blank','_blank');
            try{
              const { data:sess } = await sb.auth.getSession();
              const jwt = sess && sess.session ? sess.session.access_token : null;
              if(!jwt){ if(aba) aba.location=m.url; return; }
              const r=await fetch('https://agentes-de-whatsapp-production.up.railway.app/painel/sso-gerar-supabase',{
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':'Bearer '+jwt},
                body:JSON.stringify({sistema:m.sso})
              });
              const j=await r.json();
              if(j.ok && j.token){
                const sep=m.url.indexOf('?')>=0?'&':'?';
                if(aba) aba.location=m.url+sep+'sso='+encodeURIComponent(j.token);
              } else {
                if(aba) aba.location=m.url;
              }
            }catch(e){ if(aba) aba.location=m.url; }
          };
        } else {
          c=el('<a class="mod" href="'+m.url+'" target="_blank" rel="noopener">'+inner+'</a>');
        }
        g.appendChild(c);
      });
    }
    w.appendChild(g);
    app.appendChild(w);

    function renderRelatorios(){
      const w=topo("Relatórios");
      const vb=w.querySelector("#voltar"); vb.textContent="← Lançamentos"; vb.onclick=renderLista;

      const vend=base.filter(v=>v.tipo==='Venda'), loc=base.filter(v=>v.tipo!=='Venda');
      const vgn=base.reduce((s,v)=>s+vgnDe(v),0), vgv=soma(vend,'vgv'), vgl=soma(loc,'comissao'), com=soma(base,'comissao');
      const hoje=new Date().toISOString().slice(0,10);

      let html='<div class="secfiltros">';
      html+='<select id="rAno" class="inp secsel"><option value="todos">Todos os anos</option>'+anos.map(a=>'<option value="'+a+'"'+(fAno===a?' selected':'')+'>'+a+'</option>').join('')+'</select>';
      html+='<select id="rMes" class="inp secsel"><option value="todos">Todos os meses</option>'+MESES.map((m,i)=>{const mm=String(i+1).padStart(2,'0');return '<option value="'+mm+'"'+(fMes===mm?' selected':'')+'>'+m+'</option>';}).join('')+'</select></div>';

      html+='<div class="sech3">Resumo do período</div>';
      html+='<div class="secgrid2"><div class="seccard"><div class="secl">VGN</div><div class="secv2" style="color:#0E79B4">'+BRL(vgn)+'</div></div><div class="seccard"><div class="secl">VGV — vendas</div><div class="secv2" style="color:#2563eb">'+BRL(vgv)+'</div></div><div class="seccard"><div class="secl">VGL — locações</div><div class="secv2" style="color:#b45309">'+BRL(vgl)+'</div></div></div>';
      html+='<div class="secgrid2"><div class="seccard"><div class="secl">Comissão total</div><div class="secv2">'+BRL(com)+'</div></div><div class="seccard"><div class="secl">Lançamentos</div><div class="secv2">'+base.length+'</div></div><div class="seccard"><div class="secl">Ticket médio (comissão)</div><div class="secv2">'+BRL(base.length?com/base.length:0)+'</div></div></div>';

      const rank=(nomeKey,valKey)=>{
        const m={};
        base.forEach(v=>{ const n=(v[nomeKey]||'').trim(); if(!n) return; if(!m[n]) m[n]={n:0,t:0}; m[n].n++; m[n].t+=Number(v[valKey])||0; });
        return Object.entries(m).map(([n,o])=>({nome:n,qtd:o.n,total:o.t})).sort((a,b)=>b.total-a.total);
      };
      const tabela=(titulo,arr)=>{
        let t='<div class="sech3">'+titulo+'</div><div style="overflow-x:auto"><table class="sectab"><thead><tr><th>Nome</th><th class="r">Lançamentos</th><th class="r">Total</th></tr></thead><tbody>';
        if(!arr.length) t+='<tr><td colspan="3" style="text-align:center;padding:18px;color:#9ca3af">Nenhum recebedor informado neste filtro.</td></tr>';
        arr.forEach(r=>{ t+='<tr><td style="font-weight:600">'+esc(r.nome)+'</td><td class="r">'+r.qtd+'</td><td class="r" style="font-weight:700;color:#0E79B4">'+BRL(r.total)+'</td></tr>'; });
        return t+'</tbody></table></div>';
      };
      html+=tabela('Comissões por corretor', rank('corretor','p_corretor'));
      html+=tabela('Comissões por captador', rank('captador','p_captador'));
      html+=tabela('Comissões por gerente', rank('gerente','p_gerente'));

      // Relatório unificado por pessoa (soma todos os papéis)
      html+='<div class="sech3" style="margin-top:20px">Ganhos totais por pessoa (todos os papéis)</div>';
      const porPessoa={};
      const addPessoa=(nome,id,papel,val)=>{
        if(!nome&&!id) return;
        const chave=id||nome;
        if(!porPessoa[chave]) porPessoa[chave]={nome:nome||'—',id,corretor:0,captador:0,gerente:0,total:0};
        porPessoa[chave][papel]+=Number(val)||0;
        porPessoa[chave].total+=Number(val)||0;
      };
      baseConcluida.forEach(v=>{
        addPessoa(v.corretor,v.corretor_id,'corretor',v.p_corretor);
        addPessoa(v.captador,v.captador_id,'captador',v.p_captador);
        addPessoa(v.gerente,v.gerente_id,'gerente',v.p_gerente);
      });
      const pessoasOrd=Object.values(porPessoa).sort((a,b)=>b.total-a.total);
      html+='<div style="overflow-x:auto"><table class="sectab"><thead><tr><th>Pessoa</th><th class="r">Corretor</th><th class="r">Captador</th><th class="r">Gerente</th><th class="r">Total</th></tr></thead><tbody>';
      if(!pessoasOrd.length) html+='<tr><td colspan="5" style="text-align:center;padding:18px;color:#9ca3af">Nenhum dado no filtro.</td></tr>';
      pessoasOrd.forEach(p=>{
        html+='<tr>'
          +'<td style="font-weight:600">'+esc(p.nome)+'</td>'
          +'<td class="r">'+(p.corretor?BRL(p.corretor):'—')+'</td>'
          +'<td class="r">'+(p.captador?BRL(p.captador):'—')+'</td>'
          +'<td class="r">'+(p.gerente?BRL(p.gerente):'—')+'</td>'
          +'<td class="r" style="font-weight:700;color:#0E79B4">'+BRL(p.total)+'</td>'
          +'</tr>';
      });
      html+='</tbody></table></div>';

      const imobTot=soma(base,'p_imobiliaria');
      const recebido=base.filter(v=>v.imob_data_recebimento && String(v.imob_data_recebimento)<=hoje).reduce((s,v)=>s+(Number(v.p_imobiliaria)||0),0);
      const aReceber=imobTot-recebido;
      html+='<div class="sech3">Recebimentos da imobiliária</div>';
      html+='<div class="secgrid2"><div class="seccard"><div class="secl">Total da imobiliária</div><div class="secv2" style="color:#059669">'+BRL(imobTot)+'</div></div><div class="seccard"><div class="secl">Já recebido</div><div class="secv2" style="color:#059669">'+BRL(recebido)+'</div></div><div class="seccard"><div class="secl">A receber</div><div class="secv2" style="color:#dc2626">'+BRL(aReceber)+'</div></div></div>';
      const pend=base.filter(v=>(Number(v.p_imobiliaria)||0)>0 && !(v.imob_data_recebimento && String(v.imob_data_recebimento)<=hoje));
      html+='<div class="sech3" style="font-size:14px">A receber / sem data</div><div style="overflow-x:auto"><table class="sectab"><thead><tr><th>Venda</th><th>Cliente</th><th class="r">Valor</th><th>Previsão</th></tr></thead><tbody>';
      if(!pend.length) html+='<tr><td colspan="4" style="text-align:center;padding:18px;color:#9ca3af">Nada pendente. ✓</td></tr>';
      pend.forEach(v=>{ html+='<tr><td>'+fmtD(v.data)+'</td><td style="font-weight:600">'+esc(v.cliente||'—')+'</td><td class="r" style="font-weight:700;color:#059669">'+BRL(v.p_imobiliaria)+'</td><td>'+(v.imob_data_recebimento?fmtD(v.imob_data_recebimento):'<span style="color:#dc2626">sem data</span>')+'</td></tr>'; });
      html+='</tbody></table></div>';

      const cont=el('<div></div>'); cont.innerHTML=html; w.appendChild(cont);
      cont.querySelector("#rAno").onchange=(e)=>{fAno=e.target.value;renderRelatorios();};
      cont.querySelector("#rMes").onchange=(e)=>{fMes=e.target.value;renderRelatorios();};
    }

      // status com botões de avanço
      html+='<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:600;color:var(--mut);margin-bottom:6px">STATUS DO NEGÓCIO</div><div id="statusBts" style="display:flex;flex-wrap:wrap;gap:6px">';
      STATUS_CV.forEach(s=>{ html+='<button class="sectag stabt" data-s="'+s.id+'" style="cursor:pointer;border:2px solid '+(v.status_cv===s.id?s.cor:'transparent')+';background:'+s.bg+';color:'+s.cor+';padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600">'+s.label+'</button>'; });
      html+='</div></div>';

        html+=linha('Comissão',BRL(v.comissao)+' <span style="font-weight:500;color:#9ca3af;font-size:12px">('+pct(v.comissao,v.vgv).toFixed(2)+'% do VGV)</span>','#059669');
      }

      [
        ['Corretor',    v.corretor,  v.p_corretor,     v.data_corretor,          '#2563eb'],
        ['Captador',    v.captador,  v.p_captador,     v.data_captador,          '#0891b2'],
        ['Gerente',     v.gerente,   v.p_gerente,      v.data_gerente,           '#7c3aed'],

      ].forEach(([titulo,quem,val,dt,cor])=>{
        const pago=!!dt;
        const stBadge=pago?'background:#d1fae5;color:#059669':'background:#fee2e2;color:#dc2626';
        html+='<tr>'
          +'<td style="font-weight:600;color:'+cor+'">'+titulo+(quem?' <span style="font-weight:400;font-size:12px;color:#6b7280">'+esc(quem)+'</span>':'')+'</td>'
          +'<td class="r">'+BRL(val)+'</td>'

          const idx=dados.findIndex(x=>String(x.id)===String(v.id)); if(idx>=0){ dados[idx].status_cv='distrato'; dados[idx].data_status_atualizado=v.data_status_atualizado; }

      // botões de status

    // ---------- PASTA DO NEGÓCIO (arraste documentos → a IA monta o cadastro) ----------
    // Botão de microfone (ditar por voz) usando o reconhecimento de voz nativo do navegador.
    function addMic(inputEl){
      const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!Rec) return null;
      const btn=el('<button type="button" title="Ditar por voz" style="flex:none;width:34px;height:34px;border-radius:8px;border:1px solid var(--bd,#e5e7eb);background:#fff;cursor:pointer;font-size:15px">\ud83c\udfa4</button>');
      let rec=null, ouvindo=false;
      btn.onclick=(e)=>{ e.preventDefault(); e.stopPropagation();
        if(ouvindo){ if(rec) rec.stop(); return; }
        rec=new Rec(); rec.lang='pt-BR'; rec.interimResults=true; rec.continuous=true;
        const base=inputEl.value?inputEl.value+' ':''; let finalTxt='';
        rec.onresult=(ev)=>{ let interim=''; for(let i=ev.resultIndex;i<ev.results.length;i++){ const r=ev.results[i]; if(r.isFinal) finalTxt+=r[0].transcript; else interim+=r[0].transcript; } inputEl.value=base+finalTxt+interim; inputEl.dispatchEvent(new Event('input')); };
        rec.onend=()=>{ ouvindo=false; btn.textContent='\ud83c\udfa4'; btn.style.background='#fff'; };
        rec.onerror=()=>{ ouvindo=false; btn.textContent='\ud83c\udfa4'; btn.style.background='#fff'; };
        try{ rec.start(); ouvindo=true; btn.textContent='\u23f9'; btn.style.background='#fee2e2'; }catch(err){}
      };
      return btn;
    }

        +'<div style="font-size:12px;color:var(--mut);margin-bottom:4px">Pode arrastar os documentos de <b>várias pessoas misturados</b> na mesma área (com nomes de arquivo aleatórios). A IA separa por pessoa e cria um cadastro para cada uma. O mesmo vale para vários vendedores ou corretores.</div>'

      function b64(file){ return new Promise((ok,err)=>{ const r=new FileReader(); r.onload=()=>ok(String(r.result).split(',')[1]); r.onerror=()=>err(new Error('falha ao ler o arquivo')); r.readAsDataURL(file); }); }
      async function encolher(file){
        if(!/^image\//.test(file.type)) return file;
        return await new Promise((ok)=>{ const img=new Image(); const url=URL.createObjectURL(file);
          img.onload=()=>{ const max=1600,sc=Math.min(1,max/Math.max(img.width,img.height)); const c=document.createElement('canvas'); c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc); c.getContext('2d').drawImage(img,0,0,c.width,c.height); URL.revokeObjectURL(url); c.toBlob(bl=>ok(new File([bl],file.name,{type:'image/jpeg'})),'image/jpeg',0.85); };

      async function analisarNegocio(files, bt, st){
        if(!files || !files.length){ st.style.color='#b45309'; st.textContent='Arraste pelo menos um documento primeiro.'; return; }
        bt.disabled=true; const txtBt=bt.textContent; bt.textContent='Analisando\u2026';
        st.style.color='#2563eb'; st.textContent='\ud83d\udcf7 Lendo '+files.length+' documento(s) e entendendo o neg\u00f3cio\u2026';
        try{
          const documentos=[];
          for(const fl of files){ const prep=await encolher(fl); documentos.push({ data:await b64(prep), media_type:prep.type||'image/jpeg', _file:fl }); }
          const r=await fetch(BACKEND+'/secretaria/analisar-negocio',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({documentos:documentos.map(d=>({data:d.data,media_type:d.media_type}))})});
          const j=await r.json();
          if(!j.ok){ st.style.color='#dc2626'; st.textContent='N\u00e3o consegui analisar: '+(j.error||'erro'); bt.disabled=false; bt.textContent=txtBt; return; }
          const participantes=Array.isArray(j.participantes)?j.participantes:[];
          if(!participantes.length){ st.style.color='#b45309'; st.textContent='A IA n\u00e3o identificou nenhuma parte. Tente documentos mais leg\u00edveis.'; bt.disabled=false; bt.textContent=txtBt; return; }
          st.textContent='Criando os cadastros\u2026';
          const ordemPorPapel={};
          const participantes_criados=[];
          for(const p of participantes){
            const papel=['comprador','vendedor','imovel','corretor'].indexOf(p.papel)>=0?p.papel:'comprador';
            if(ordemPorPapel[papel]==null) ordemPorPapel[papel]=0;
            const payload={ venda_id:v.id, papel:papel, ordem:ordemPorPapel[papel]++, interno:true,
              nome:p.nome||'', documento:p.documento||'', rg:p.rg||'', nacionalidade:p.nacionalidade||'', estado_civil:p.estado_civil||'', profissao:p.profissao||'', endereco:p.endereco||'', email:p.email||'', telefone:p.telefone||'', creci:p.creci||'',
              rep_nome:p.rep_nome||'', rep_documento:p.rep_documento||'', rep_rg:p.rep_rg||'', rep_cargo:p.rep_cargo||'' };
            const ins=await sb.from('venda_participantes').insert(payload).select();
            if(ins.error){ st.style.color='#dc2626'; st.textContent='Erro ao criar cadastro: '+ins.error.message; bt.disabled=false; bt.textContent=txtBt; return; }
            const novo=(ins.data&&ins.data[0])||null;
            if(novo){ participantes_criados.push({...novo}); }
            if(novo && Array.isArray(p.docs)){ for(const n of p.docs){ const dd=documentos[n-1]; if(dd && dd._file){ await subir(dd._file, novo.id, 'documento', true); } } }
          }
          ultimasDuvidas = Array.isArray(j.duvidas)?j.duvidas:[];
          st.style.color='#16a34a'; st.textContent='\u2713 Documentos lidos! Confirmando quem é quem\u2026';
          setTimeout(()=>confirmarPapeis(participantes_criados, ()=>completarCamposFaltantes(()=>carregar())), 400);

            const cor=COR[p.papel]||'#6b7280';

      // Depois da análise: pega os campos que a IA não preencheu e pergunta um a um (estilo card).
      async function completarCamposFaltantes(depois){
        let parts=[];
        try{ const r=await sb.from('venda_participantes').select('*').eq('venda_id',v.id).order('papel').order('ordem'); parts=r.data||[]; }catch(e){ if(depois) depois(); return; }
        const CAMPOS_PF=[['nome','nome completo'],['documento','CPF'],['rg','RG (com \u00f3rg\u00e3o emissor)'],['nacionalidade','nacionalidade'],['estado_civil','estado civil'],['profissao','profiss\u00e3o'],['endereco','endere\u00e7o completo']];
        const CAMPOS_EMP=[['nome','raz\u00e3o social'],['documento','CNPJ'],['endereco','endere\u00e7o da sede'],['rep_nome','nome de quem assina pela empresa'],['rep_documento','CPF de quem assina'],['rep_cargo','cargo de quem assina (s\u00f3cio, diretor\u2026)']];
        const CAMPOS_IMOVEL=[['nome','identifica\u00e7\u00e3o do im\u00f3vel (lote/quadra/nome)'],['documento','n\u00famero da matr\u00edcula'],['endereco','endere\u00e7o do im\u00f3vel'],['profissao','\u00e1rea/metragem (m\u00b2)']];
        const CAMPOS_CORRETOR=[['nome','nome do corretor'],['creci','CRECI']];
        const fila=[];
        parts.forEach(p=>{
          let campos;
          if(p.papel==='imovel') campos=CAMPOS_IMOVEL;
          else if(p.papel==='corretor') campos=CAMPOS_CORRETOR;
          else { const ehEmp=!!(p.rep_nome||p.rep_documento||p.rep_cargo) || String(p.documento||'').replace(/\D/g,'').length>11; campos=ehEmp?CAMPOS_EMP:CAMPOS_PF; }
          campos.forEach(c=>{ if(!String(p[c[0]]||'').trim()) fila.push({pid:p.id,papel:p.papel,nome:p.nome,campo:c[0],rotulo:c[1]}); });
        });
        if(!fila.length){ if(depois) depois(); return; }
        const ov=el('<div class="secmodal"></div>'); document.body.appendChild(ov);
        let i=0;
        function quemTxt(q){ if(q.papel==='imovel') return q.nome?('o im\u00f3vel \u201c'+q.nome+'\u201d'):'o im\u00f3vel'; return q.nome?('\u201c'+q.nome+'\u201d'):'este cadastro'; }
        function mostra(){
          if(i>=fila.length){ ov.remove(); if(depois) depois(); return; }
          const q=fila[i];
          ov.innerHTML='<div class="secbox" style="max-width:540px"><div style="font-size:12px;color:var(--mut);margin-bottom:8px">Completando o que faltou \u00b7 '+(i+1)+' de '+fila.length+'</div><h3 style="margin:0 0 12px;font-size:18px;font-weight:800;line-height:1.35">Qual '+esc(q.rotulo)+' de '+esc(quemTxt(q))+'?</h3></div>';
          const box=ov.querySelector('.secbox');
          const row=el('<div style="display:flex;gap:8px;align-items:center"></div>');
          const inp=el('<input class="inp" style="flex:1" placeholder="Sua resposta\u2026 (pode pular)">');
          row.appendChild(inp); const mic=addMic(inp); if(mic) row.appendChild(mic); box.appendChild(row);
          const bar=el('<div style="display:flex;justify-content:space-between;gap:10px;margin-top:16px"></div>');
          const esq=el('<button class="ghost" style="padding:8px 14px">Pular esta</button>');
          esq.onclick=()=>{ i++; mostra(); };
          const dir=el('<div style="display:flex;gap:10px"></div>');
          if(i>0){ const volta=el('<button class="ghost" style="padding:8px 14px">\u2190 Voltar</button>'); volta.onclick=()=>{ i--; mostra(); }; dir.appendChild(volta); }
          const ok=el('<button class="btn" style="padding:8px 18px;max-width:200px">'+(i+1>=fila.length?'Concluir':'Pr\u00f3xima \u2192')+'</button>');
          ok.onclick=async()=>{ const val=inp.value.trim(); if(val){ ok.disabled=true; const u=await sb.from('venda_participantes').update({[q.campo]:val}).eq('id',q.pid); if(u.error){ alert('Erro ao salvar: '+u.error.message); ok.disabled=false; return; } } i++; mostra(); };
          dir.appendChild(ok); bar.appendChild(esq); bar.appendChild(dir); box.appendChild(bar);
          try{ inp.focus(); }catch(e){}
          inp.onkeydown=(e)=>{ if(e.key==='Enter') ok.click(); };
        }
        mostra();
      }

      async function processarLeva(files, papel, drop, parts){
        const st=el('<div style="font-size:13px;color:#2563eb;margin-top:8px;padding:9px;background:#eff6ff;border-radius:8px">📷 Lendo '+files.length+' documento(s) com a IA e separando por pessoa…</div>');
        drop.after(st);
        try{
          const documentos=[];
          for(const f of files){ const prep=await encolher(f); documentos.push({ data:await b64(prep), media_type:prep.type||'image/jpeg' }); }
          const r=await fetch(BACKEND+'/secretaria/extrair-multiplos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({documentos:documentos,papel:papel})});
          const j=await r.json();
          if(!j.ok){ st.style.color='#dc2626'; st.style.background='#fef2f2'; st.textContent='Não consegui ler: '+(j.error||'erro'); return; }
          let pessoas=Array.isArray(j.pessoas)?j.pessoas:[];
          if(!pessoas.length) pessoas=[{docs:files.map((_,i)=>i+1)}]; // nada separado → uma pessoa com tudo
          const baseOrdem=parts.filter(x=>x.papel===papel).length;
          const usados=new Set();
          const criadas=[];
          for(let i=0;i<pessoas.length;i++){
            const d=pessoas[i]||{};
            const payload={ venda_id:v.id, papel:papel, ordem:baseOrdem+i, interno:true,
              nome:d.nome||'', documento:d.documento||'', rg:d.rg||'', nacionalidade:d.nacionalidade||'', estado_civil:d.estado_civil||'', profissao:d.profissao||'', endereco:d.endereco||'' };
            const ins=await sb.from('venda_participantes').insert(payload).select();
            if(ins.error){ st.style.color='#dc2626'; st.style.background='#fef2f2'; st.textContent='Erro ao criar cadastro: '+ins.error.message; return; }
            const novo=(ins.data&&ins.data[0])||null;
            criadas.push({ novo:novo, docs:Array.isArray(d.docs)?d.docs:[] });
          }
          // anexa cada documento à pessoa que a IA indicou
          for(const c of criadas){ if(!c.novo) continue; for(const n of c.docs){ const f=files[n-1]; if(f && !usados.has(n)){ await subir(f, c.novo.id, papel==='imovel'?'documento':'documento', true); usados.add(n); } } }
          // qualquer documento que sobrou (a IA não associou) vai pro primeiro cadastro, pra não perder
          if(criadas[0] && criadas[0].novo){ for(let i=0;i<files.length;i++){ if(!usados.has(i+1)){ await subir(files[i], criadas[0].novo.id, 'documento', true); usados.add(i+1); } } }
          st.style.color='#059669'; st.style.background='#ecfdf5'; st.textContent='✓ '+criadas.length+' cadastro(s) criado(s). Confira os dados e clique em Salvar em cada um.';
          setTimeout(()=>{ st.remove(); carregar(); }, 1200);
        }catch(e){ st.style.color='#dc2626'; st.style.background='#fef2f2'; st.textContent='Erro: '+e.message; }
      }

      async function salvarParticipante(p){

      async function subir(file, participante_id, categoria, silencioso){
        try{
          const safe=file.name.replace(/[^\w.\-]+/g,'_'); const path=v.id+'/'+Date.now()+'_'+Math.random().toString(36).slice(2,6)+'_'+safe;
          const up=await sb.storage.from('vendas-docs').upload(path,file);
          if(up.error) throw up.error;
          const ins=await sb.from('venda_anexos').insert({venda_id:v.id,participante_id:participante_id||null,categoria:categoria||'documento',nome_arquivo:file.name,storage_path:path,tamanho:file.size});
          if(ins.error) throw ins.error;
          if(!silencioso) carregar();
        }catch(e){ if(!silencioso) alert('Erro ao subir o arquivo: '+e.message); }
      }

        const del=el('<button class="btdel" style="padding:3px 10px;font-size:12px">×</button>');

        row.appendChild(ver); row.appendChild(del); return row;
      }

      carregar();

      // 1) carrega as partes da pasta e pede à IA o que ainda falta perguntar
      async function iniciar(){
        setHTML('<div style="font-size:14px;color:#2563eb;margin-top:14px">📚 Lendo a pasta e vendo o que falta pra montar o contrato…</div>');
        try{
          const p=await sb.from('venda_participantes').select('*').eq('venda_id',v.id).order('papel').order('ordem');
          if(p.error) throw p.error;
          participantes=p.data||[];
          const r=await fetch(BACKEND+'/secretaria/contrato-perguntas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({minuta:minuta,participantes:participantes,venda:dadosVenda})});
          const j=await r.json();
          if(!j.ok){ erro('Não consegui montar as perguntas: '+(j.error||'erro')); return; }
          perguntas=Array.isArray(j.perguntas)?j.perguntas:[]; idx=0; respostas={};
          proxima();
        }catch(e){ erro('Erro: '+e.message); }
      }

      // 2) uma pergunta por vez
      function proxima(){
        if(idx>=perguntas.length){ adicionais(); return; }
        const q=perguntas[idx], total=perguntas.length;
        setHTML('<h3 style="margin:0 0 4px;font-size:19px;font-weight:800">📄 Montando o contrato</h3>'
          +'<div style="font-size:12px;color:var(--mut);margin-bottom:14px">Pergunta '+(idx+1)+' de '+total+' · <b>'+esc(v.cliente||'')+'</b> · '+BRL(precoFinal)+'</div>'
          +'<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px 16px;margin-bottom:12px"><div style="font-size:15px;font-weight:600;color:#1e3a8a">'+esc(q.label||'')+'</div>'+(q.dica?'<div style="font-size:12.5px;color:#64748b;margin-top:4px">'+esc(q.dica)+'</div>':'')+'</div>');
        const ta=el('<textarea class="inp" style="width:100%;min-height:90px;resize:vertical" placeholder="Sua resposta… (pode deixar em branco e pular)"></textarea>');
        if(respostas[q.id]) ta.value=respostas[q.id];
        box.appendChild(ta);
        const mic=addMicLocal(ta); if(mic){ const row=el('<div style="margin-top:6px"></div>'); row.appendChild(mic); box.appendChild(row); }
        const bar=el('<div style="display:flex;justify-content:space-between;gap:10px;margin-top:14px"></div>');
        const btVoltar=el('<button class="ghost" style="padding:9px 14px">← Voltar</button>');
        btVoltar.onclick=()=>{ respostas[q.id]=ta.value.trim(); if(idx>0){ idx--; proxima(); } else telaPreco(); };
        const dir=el('<div style="display:flex;gap:10px"></div>');
        const btPular=el('<button class="ghost" style="padding:9px 14px">Pular</button>');
        btPular.onclick=()=>{ respostas[q.id]=''; idx++; proxima(); };
        const btProx=el('<button class="btn" style="padding:9px 18px;max-width:200px">'+(idx+1>=total?'Avançar →':'Próxima →')+'</button>');
        btProx.onclick=()=>{ respostas[q.id]=ta.value.trim(); idx++; proxima(); };
        dir.appendChild(btPular); dir.appendChild(btProx);
        bar.appendChild(btVoltar); bar.appendChild(dir); box.appendChild(bar);
        try{ ta.focus(); }catch(e){}
      }

      // 3) caixa final de informações adicionais
      function adicionais(){
        setHTML('<h3 style="margin:0 0 4px;font-size:19px;font-weight:800">📄 Quase lá</h3>'
          +'<div style="font-size:13px;color:var(--mut);margin-bottom:12px">Quer acrescentar ou mudar algo que eu não perguntei? (cláusula extra, observação, ajuste). Pode deixar em branco.</div>');
        const ta=el('<textarea class="inp" style="width:100%;min-height:120px;resize:vertical" placeholder="Ex.: incluir cláusula de tolerância de atraso; o imóvel será entregue mobiliado; etc."></textarea>');
        box.appendChild(ta);
        const mic=addMicLocal(ta); if(mic){ const row=el('<div style="margin-top:6px"></div>'); row.appendChild(mic); box.appendChild(row); }
        const msg=el('<div style="font-size:13px;margin:10px 0;min-height:18px"></div>');
        const bar=el('<div style="display:flex;justify-content:space-between;gap:10px;margin-top:8px"></div>');
        const btVoltar=el('<button class="ghost" style="padding:9px 14px">← Voltar</button>');
        btVoltar.onclick=()=>{ if(perguntas.length){ idx=perguntas.length-1; proxima(); } else telaPreco(); };
        if(!perguntas.length) btVoltar.style.visibility='hidden';
        const btGerar=el('<button class="btn" style="padding:10px 20px;max-width:240px">✍️ Redigir o contrato</button>');
        btGerar.onclick=()=>redigir(ta.value.trim(), msg, btGerar);
        bar.appendChild(btVoltar); bar.appendChild(btGerar);
        box.appendChild(msg); box.appendChild(bar);
      }

      // 4) a IA redige o contrato e salva o HTML na pasta
      async function redigir(adic, msg, bt){
        bt.disabled=true; msg.style.color='#2563eb'; msg.textContent='✍️ A IA está redigindo o contrato… (pode levar alguns segundos)';
        const respArr=perguntas.map(q=>({id:q.id,label:q.label,resposta:respostas[q.id]||''}));
        try{
          const r=await fetch(BACKEND+'/secretaria/redigir-contrato',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({minuta:minuta,participantes:participantes,venda:dadosVenda,respostas:respArr,adicionais:adic})});
          const j=await r.json();
          if(!j.ok || !j.html){ msg.style.color='#dc2626'; msg.textContent='Não consegui redigir: '+(j.error||'erro'); bt.disabled=false; return; }
          htmlContrato=j.html;
          // salva o contrato como anexo de texto na pasta
          try{
            const blob=new Blob(['<!doctype html><html lang="pt-br"><meta charset="utf-8">'+htmlContrato],{type:'text/html'});
            const nomeArq='contrato-'+esc(v.cliente||'venda').replace(/[^a-z0-9]/gi,'_').slice(0,30)+'-'+new Date().toISOString().slice(0,10)+'.html';
            await subir(new File([blob],nomeArq,{type:'text/html'}),null,'contrato',true);
          }catch(e){ /* salvar é bônus; se falhar, não impede de abrir */ }
          telaFinalContrato(msg);
          bt.disabled=false;
        }catch(e){ msg.style.color='#dc2626'; msg.textContent='Erro: '+e.message; bt.disabled=false; }
      }

      // 5) tela de saída — depois de redigir, com todas as opções
      function telaFinalContrato(msgAnterior){
        setHTML('<div style="text-align:center;padding:10px 0"><div style="font-size:40px;margin-bottom:8px">✅</div>'
          +'<h3 style="margin:0 0 6px;font-size:19px;font-weight:800">Contrato redigido!</h3>'
          +'<div style="font-size:13px;color:var(--mut);margin-bottom:22px">O arquivo foi salvo na pasta desta venda. O que deseja fazer agora?</div></div>');
        const bts=el('<div style="display:flex;flex-direction:column;gap:10px;max-width:380px;margin:0 auto"></div>');
        const btVer=el('<button class="btn" style="padding:11px 18px;font-size:15px">📄 Abrir e editar o contrato</button>');
        btVer.onclick=()=>abrirContratoEditavel(htmlContrato);
        const btWord=el('<button class="ghost" style="padding:10px 18px">📥 Baixar em Word (.docx)</button>');
        btWord.onclick=()=>baixarWord(htmlContrato, v.cliente);
        const btRefazer=el('<button class="ghost" style="padding:10px 18px">↺ Refazer o contrato</button>');
        btRefazer.onclick=()=>telaPreco();
        const btPasta=el('<button class="ghost" style="padding:10px 18px">← Voltar pra pasta</button>');
        btPasta.onclick=()=>abrirPasta(v);
        bts.appendChild(btVer); bts.appendChild(btWord); bts.appendChild(btRefazer); bts.appendChild(btPasta);
        box.appendChild(bts);
      }

      // abre o contrato em nova aba editável
      // microfone
      function addMicLocal(inputEl){
        const Rec=window.SpeechRecognition||window.webkitSpeechRecognition;
        if(!Rec) return null;
        const btn=el('<button type="button" title="Ditar por voz" style="width:34px;height:34px;border-radius:8px;border:1px solid var(--bd,#e5e7eb);background:#fff;cursor:pointer;font-size:15px">\ud83c\udfa4</button>');
        let rec=null, ouvindo=false;
        btn.onclick=(e)=>{ e.preventDefault();
          if(ouvindo){ if(rec) rec.stop(); return; }
          rec=new Rec(); rec.lang='pt-BR'; rec.interimResults=true; rec.continuous=true;
          const base=inputEl.value?inputEl.value+' ':''; let finalTxt='';
          rec.onresult=(ev)=>{ let interim=''; for(let i=ev.resultIndex;i<ev.results.length;i++){ const rr=ev.results[i]; if(rr.isFinal) finalTxt+=rr[0].transcript; else interim+=rr[0].transcript; } inputEl.value=base+finalTxt+interim; };
          rec.onend=()=>{ ouvindo=false; btn.textContent='\ud83c\udfa4'; btn.style.background='#fff'; };
          rec.onerror=()=>{ ouvindo=false; btn.textContent='\ud83c\udfa4'; btn.style.background='#fff'; };
          try{ rec.start(); ouvindo=true; btn.textContent='\u23f9'; btn.style.background='#fee2e2'; }catch(err){}
        };
        return btn;
      }

      telaPreco(); // começa pela tela de confirmação de preço
    }


    // Cache de corretores e captadores para os selects
    let _corretores=[], _captadores=[];
    async function carregarPessoas(){
      try{
        const {data:c}=await sb.from('perfis').select('id,nome,gerente_id').order('nome');
        _corretores=c||[];
      }catch(e){}
      try{
        // captadores = qualquer pessoa com is_captador=true (internos e externos)
        const {data:cp}=await sb.from('perfis').select('id,nome,cpf').filter('is_captador','eq',true).order('nome');
        _captadores=cp||[];
      }catch(e){}
    }

    function abrirEditor(v, depois){
      const f=Object.assign({},v);
      const ov=el('<div class="secmodal"></div>');
      ov.innerHTML='<div class="secbox" style="max-width:640px"><h3 style="margin:0 0 4px;font-size:18px;font-weight:700">'+(v.id?'Editar lançamento':'Novo lançamento')+'</h3><div id="hint" style="font-size:12px;color:var(--mut);margin-bottom:14px"></div><div id="form"></div><div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px"><button class="ghost" id="cancel">Cancelar</button><button class="btn" id="salvar" style="max-width:160px">Salvar</button></div></div>';
      document.body.appendChild(ov);
      const box=ov.querySelector("#form");

      function optsCorretores(selId){ return '<option value="">— selecione —</option>'+_corretores.map(c=>'<option value="'+c.id+'"'+(selId===c.id?' selected':'')+'>'+esc(c.nome)+'</option>').join(''); }
      function optsCaptadores(selId){ return '<option value="">— selecione —</option>'+_captadores.map(c=>'<option value="'+c.id+'"'+(selId===c.id?' selected':'')+'>'+esc(c.nome)+(c.cpf?' ('+c.cpf+')':'')+'</option>').join(''); }

      function montar(){
        const isLoc=f.tipo==='Locação';
        ov.querySelector("#hint").textContent=isLoc?'Locação: informe a comissão recebida (VGL).':'Venda: informe o VGV e a comissão. O corretor e captador são obrigatórios para status diferente de Rascunho.';
        const isRasc=!f.status_cv||f.status_cv==='rascunho';
        let h='<div class="secform">';
        h+='<label><span class="secll">Data</span><input class="inp" data-k="data" type="date" value="'+esc(f.data||'')+'"/></label>';
        h+='<label><span class="secll">Tipo</span><select class="inp" data-k="tipo"><option'+(f.tipo==='Venda'?' selected':'')+'>Venda</option><option'+(isLoc?' selected':'')+'>Locação</option></select></label>';
        h+='<label style="grid-column:1/3"><span class="secll">Cliente</span><input class="inp" data-k="cliente" value="'+esc(f.cliente||'')+'"/></label>';
        h+='<label style="grid-column:1/3"><span class="secll">Imóvel (descrição)</span><input class="inp" data-k="imovel" value="'+esc(f.imovel||'')+'"/></label>';
        h+='<label style="grid-column:1/3"><span class="secll">Código do imóvel no Estoque</span><input class="inp" data-k="codigo_imovel" value="'+esc(f.codigo_imovel||'')+'" placeholder="Ex.: JMI-001"/></label>';
        if(isLoc){
          h+='<label style="grid-column:1/3"><span class="secll">Comissão / VGL (R$)</span><input class="inp" data-k="comissao" type="number" value="'+esc(f.comissao==null?'':f.comissao)+'"/></label>';
        } else {
          h+='<label><span class="secll">VGV (R$)</span><input class="inp" data-k="vgv" type="number" value="'+esc(f.vgv==null?'':f.vgv)+'"/></label>';
          h+='<label><span class="secll">Comissão (R$)</span><input class="inp" data-k="comissao" type="number" value="'+esc(f.comissao==null?'':f.comissao)+'"/></label>';
        }
        // Corretor — select de perfis
        h+='<label><span class="secll">Corretor (R$)</span><input class="inp" data-k="p_corretor" type="number" value="'+esc(f.p_corretor==null?'':f.p_corretor)+'"/></label>';
        h+='<label><span class="secll">Corretor'+(isRasc?'':' <b style="color:#dc2626">*</b>')+'</span><select class="inp" data-k="corretor_id" id="selCorretor">'+optsCorretores(f.corretor_id)+'</select></label>';
        h+='<label style="grid-column:1/3"><span class="secll">Corretor — data de recebimento</span><input class="inp" data-k="data_corretor" type="date" value="'+esc(f.data_corretor||'')+'"/></label>';
        // Captador — select de captadores + botão novo
        h+='<label><span class="secll">Captador (R$)</span><input class="inp" data-k="p_captador" type="number" value="'+esc(f.p_captador==null?'':f.p_captador)+'"/></label>';
        h+='<label><span class="secll">Captador'+(isRasc?'':' <b style="color:#dc2626">*</b>')+'</span><div style="display:flex;gap:6px"><select class="inp" data-k="captador_id" id="selCaptador" style="flex:1">'+optsCaptadores(f.captador_id)+'</select><button type="button" id="btNovoCap" class="ghost" style="padding:4px 10px;font-size:12px;white-space:nowrap">+ Novo</button></div></label>';
        h+='<label style="grid-column:1/3"><span class="secll">Captador — data de recebimento</span><input class="inp" data-k="data_captador" type="date" value="'+esc(f.data_captador||'')+'"/></label>';
        // Gerente — automático, mas editável
        h+='<label><span class="secll">Gerente (R$)</span><input class="inp" data-k="p_gerente" type="number" value="'+esc(f.p_gerente==null?'':f.p_gerente)+'"/></label>';
        h+='<label><span class="secll">Gerente <span style="font-weight:400;font-size:11px;color:var(--mut)">(auto)</span></span><select class="inp" data-k="gerente_id" id="selGerente">'+optsCorretores(f.gerente_id)+'</select></label>';
        h+='<label style="grid-column:1/3"><span class="secll">Gerente — data de recebimento</span><input class="inp" data-k="data_gerente" type="date" value="'+esc(f.data_gerente||'')+'"/></label>';
        // Imobiliária
        h+='<label><span class="secll">Imobiliária (R$)</span><input class="inp" data-k="p_imobiliaria" type="number" value="'+esc(f.p_imobiliaria==null?'':f.p_imobiliaria)+'"/></label>';
        h+='<label><span class="secll">Imobiliária — data recebimento</span><input class="inp" data-k="imob_data_recebimento" type="date" value="'+esc(f.imob_data_recebimento||'')+'"/></label>';
        h+='<label style="grid-column:1/3"><span class="secll">Observação</span><input class="inp" data-k="observacao" value="'+esc(f.observacao||'')+'"/></label>';
        h+='<label><span class="secll">Nº do contrato</span><input class="inp" data-k="num_contrato" value="'+esc(f.num_contrato||'')+'" placeholder="CV-2026-0001"/></label>';
        h+='<label><span class="secll">Status</span><select class="inp" data-k="status_cv">'+STATUS_CV.map(s=>'<option value="'+s.id+'"'+(f.status_cv===s.id?' selected':'')+'>'+s.label+'</option>').join('')+'</select></label>';
        h+='</div><div id="vgnInfo" style="font-size:13px;color:#0E79B4;font-weight:700;margin-top:10px"></div>';
        // campos legado (texto) ocultos — mantém compatibilidade com registros antigos
        h+='<input type="hidden" data-k="corretor" value="'+esc(f.corretor||'')+'">';
        h+='<input type="hidden" data-k="captador" value="'+esc(f.captador||'')+'">';
        h+='<input type="hidden" data-k="gerente" value="'+esc(f.gerente||'')+'">';
        box.innerHTML=h;

        const get=(k)=>box.querySelector('[data-k="'+k+'"]');
        const setv=(k,val)=>{const x=get(k); if(x) x.value=val;};
        const splitDe=(c)=>{const a=r2(c*cfg.pct_corretor/100),b=r2(c*cfg.pct_captador/100),g=r2(c*cfg.pct_gerente/100),i=r2(c*cfg.pct_imobiliaria/100); setv('p_corretor',a);setv('p_captador',b);setv('p_gerente',g);setv('p_imobiliaria',i); f.p_corretor=a;f.p_captador=b;f.p_gerente=g;f.p_imobiliaria=i;};
        const updVgn=()=>{ const c=Number(get('comissao').value)||0; box.querySelector('#vgnInfo').textContent='VGN: '+BRL(r2(c/(taxaC()/100)))+'   (comissão ÷ '+taxaC()+'%)'; };
        box.querySelectorAll('[data-k]').forEach(inp=>inp.addEventListener('input',()=>{ f[inp.dataset.k]=(inp.type==='checkbox'?inp.checked:inp.value); }));
        get('tipo').addEventListener('change',()=>{ f.tipo=get('tipo').value; montar(); });
        // Ao trocar corretor → preenche gerente automaticamente
        box.querySelector('#selCorretor').addEventListener('change',(e)=>{
          f.corretor_id=e.target.value;
          const cor=_corretores.find(c=>c.id===e.target.value);
          // nome legado
          if(cor){ get('corretor').value=cor.nome; f.corretor=cor.nome; }
          // gerente automático
          if(cor&&cor.gerente_id){
            const ger=_corretores.find(c=>c.id===cor.gerente_id);
            setv('gerente_id',cor.gerente_id); f.gerente_id=cor.gerente_id;
            if(ger){ get('gerente').value=ger.nome; f.gerente=ger.nome; }
          }
        });
        box.querySelector('#selCaptador').addEventListener('change',(e)=>{
          f.captador_id=e.target.value;
          const cap=_captadores.find(c=>c.id===e.target.value);
          if(cap){ get('captador').value=cap.nome; f.captador=cap.nome; }
        });
        box.querySelector('#selGerente').addEventListener('change',(e)=>{
          f.gerente_id=e.target.value;
          const ger=_corretores.find(c=>c.id===e.target.value);
          if(ger){ get('gerente').value=ger.nome; f.gerente=ger.nome; }
        });
        // Botão novo captador
        box.querySelector('#btNovoCap').onclick=()=>abrirNovoCaptador((novo)=>{
          _captadores.push(novo);
          _captadores.sort((a,b)=>a.nome.localeCompare(b.nome));
          f.captador_id=novo.id; f.captador=novo.nome;
          montar(); // remonta com novo captador selecionado
        });
        if(isLoc){
          get('comissao').addEventListener('input',()=>{ splitDe(Number(get('comissao').value)||0); updVgn(); });
        } else {
          get('vgv').addEventListener('input',()=>{ const vg=Number(get('vgv').value)||0; const comm=r2(vg*taxaC()/100); setv('comissao',comm); f.comissao=comm; splitDe(comm); updVgn(); });
          get('comissao').addEventListener('input',()=>{ splitDe(Number(get('comissao').value)||0); updVgn(); });
        }
        updVgn();
      }
      montar();

      const fechar=()=>ov.remove();
      ov.onclick=(e)=>{ if(e.target===ov) fechar(); };
      ov.querySelector("#cancel").onclick=fechar;
      ov.querySelector("#salvar").onclick=async()=>{
        const isLoc=f.tipo==='Locação';
        const comiss=Number(f.comissao)||0;
        const isRasc=!f.status_cv||f.status_cv==='rascunho';
        // validação: corretor e captador obrigatórios fora do rascunho
        if(!isRasc&&!f.corretor_id){ alert('Selecione o corretor antes de salvar.'); return; }
        if(!isRasc&&!f.captador_id){ alert('Selecione o captador antes de salvar.'); return; }
        const payload={
          data:f.data, tipo:f.tipo, cliente:f.cliente||null, imovel:f.imovel||null,
          codigo_imovel:f.codigo_imovel||null,
          vgv:(isLoc?0:(Number(f.vgv)||0)), comissao:comiss,
          p_corretor:Number(f.p_corretor)||0, p_captador:Number(f.p_captador)||0,
          p_gerente:Number(f.p_gerente)||0, p_imobiliaria:Number(f.p_imobiliaria)||0,
          corretor_id:f.corretor_id||null, captador_id:f.captador_id||null, gerente_id:f.gerente_id||null,
          corretor:f.corretor||null, captador:f.captador||null, gerente:f.gerente||null,
          data_corretor:f.data_corretor||null, data_captador:f.data_captador||null,
          data_gerente:f.data_gerente||null, imob_data_recebimento:f.imob_data_recebimento||null,
          observacao:f.observacao||null, num_contrato:f.num_contrato||null,
          status_cv:f.status_cv||'rascunho', data_status_atualizado:new Date().toISOString()
        };
        const btn=ov.querySelector("#salvar"); btn.disabled=true; btn.textContent="Salvando…";
        let error;
        if(v.id) ({ error }=await sb.from("vendas").update(payload).eq("id",v.id));
        else ({ error }=await sb.from("vendas").insert(payload));
        if(error){ alert('Erro ao salvar: '+error.message); btn.disabled=false; btn.textContent="Salvar"; return; }
        fechar(); await fetchAll(); if(depois) depois();
      };
    }

    // Modal de cadastro rápido de novo captador
    function abrirNovoCaptador(callback){

      ov2.innerHTML='<div class="secbox" style="max-width:440px"><h3 style="margin:0 0 14px;font-size:17px;font-weight:700">Novo captador</h3>'
        +'<div class="secform" style="grid-template-columns:1fr">'
        +'<label><span class="secll">Nome <b style="color:#dc2626">*</b></span><input class="inp" id="ncNome" placeholder="Nome completo"/></label>'
        +'<label><span class="secll">Telefone</span><input class="inp" id="ncTel" placeholder="(62) 99999-9999"/></label>'
        +'<label><span class="secll">CPF <span style="font-weight:400;font-size:11px;color:var(--mut)">(busca por CPF evita duplicatas)</span></span><input class="inp" id="ncCpf" placeholder="000.000.000-00"/></label>'
        +'<label><span class="secll">Pix</span><input class="inp" id="ncPix"/></label>'
        +'<label><span class="secll">Banco / Agência / Conta</span><input class="inp" id="ncBanco" placeholder="Ex.: Itaú / 0001 / 12345-6"/></label>'
        +'</div>'
        +'<div style="font-size:12px;color:var(--mut);margin-top:8px">CPF, Pix e dados bancários podem ser preenchidos depois, na edição do captador.</div>'
        +'<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px"><button class="ghost" id="nc2cancel">Cancelar</button><button class="btn" id="nc2salvar" style="max-width:160px">Cadastrar</button></div></div>';
      document.body.appendChild(ov2);
      ov2.querySelector('#nc2cancel').onclick=()=>ov2.remove();
      ov2.querySelector('#nc2salvar').onclick=async()=>{
        const nome=(ov2.querySelector('#ncNome').value||'').trim();
        if(!nome){ alert('Informe o nome do captador.'); return; }
        const cpf=(ov2.querySelector('#ncCpf').value||'').trim()||null;
        // verifica se já existe pelo CPF
        if(cpf){
          const exist=_captadores.find(c=>c.cpf===cpf);
          if(exist){ alert('Captador com este CPF já cadastrado: '+exist.nome); ov2.remove(); callback(exist); return; }
        }
        const btn=ov2.querySelector('#nc2salvar'); btn.disabled=true; btn.textContent='Salvando…';
        const payload={nome,telefone:(ov2.querySelector('#ncTel').value||'').trim()||null,cpf,pix:(ov2.querySelector('#ncPix').value||'').trim()||null,banco:(ov2.querySelector('#ncBanco').value||'').trim()||null};
        const {data,error}=await sb.from('captadores').insert(payload).select().single();
        if(error){ alert('Erro ao cadastrar: '+error.message); btn.disabled=false; btn.textContent='Cadastrar'; return; }
        ov2.remove(); callback(data);
      };
    }

    function gerarContrato(v){
      const modelo=cfg.contrato_modelo||'';
      if(!modelo){ alert('Nenhum modelo de contrato definido ainda. Clique em "📄 Modelo" na lista para criar/editar o texto-base.'); return; }
      const dataHoje=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
      const BRLn=(n)=>Number(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
      const map={
        cliente:v.cliente||'', imovel:v.imovel||'', tipo:(v.tipo==='Locação'?'locação':'venda'),
        vgv:BRLn((v.tipo==='Locação'?v.comissao:v.vgv)||0),
        comissao:BRLn(v.comissao||0),
        taxa:String(taxaC()), data_venda:fmtD(v.data), data_hoje:dataHoje,
        corretor:v.corretor||'', val_corretor:BRLn(v.p_corretor), data_corretor:fmtD(v.data_corretor),
        captador:v.captador||'', val_captador:BRLn(v.p_captador), data_captador:fmtD(v.data_captador),
        gerente:v.gerente||'',   val_gerente:BRLn(v.p_gerente),   data_gerente:fmtD(v.data_gerente),
        val_imobiliaria:BRLn(v.p_imobiliaria), data_imobiliaria:fmtD(v.imob_data_recebimento)
      };
      const txt=modelo.replace(/\{\{(\w+)\}\}/g,(m,k)=>map[k]!=null?map[k]:m);
      const w=window.open('','_blank');
      if(!w){ alert('Seu navegador bloqueou o pop-up. Permita pop-ups para gerar o contrato.'); return; }
      const html='<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><title>Contrato — '+esc(v.cliente||'')+'</title>'+
        '<style>body{font-family:Georgia,\'Times New Roman\',serif;max-width:720px;margin:28px auto;padding:0 26px;color:#111;line-height:1.7;font-size:15px}'+
        '.bar{position:sticky;top:0;background:#fff;padding:10px 0 12px;border-bottom:1px solid #e3e3e3;margin-bottom:26px;font-family:Arial,sans-serif;font-size:13px;color:#555}'+
        'button{font-family:Arial;padding:9px 18px;border:0;border-radius:8px;background:#D11A3A;color:#fff;font-weight:700;cursor:pointer;margin-right:10px}'+
        '.doc{white-space:pre-wrap}@media print{.bar{display:none}body{margin:0;max-width:none}}</style></head><body>'+
        '<div class="bar"><button onclick="window.print()">Imprimir / Salvar PDF</button>Texto editável — ajuste o que precisar antes de imprimir.</div>'+
        '<div class="doc" contenteditable="true">'+esc(txt)+'</div></body></html>';
      w.document.write(html); w.document.close();
    }

    // Minuta-modelo do contrato de compra e venda — base que a IA usa pra redigir.
    // ===== FASE 4: BIBLIOTECA DE DOCUMENTOS =====
    // Os 4 documentos disponíveis (contrato CV + 3 novos)
    const DOCS_BIBLIOTECA = [
      { id:'cv',         label:'Contrato de Compra e Venda', icone:'📄', cfg:'contrato_minuta_cv',         padrao:'MINUTA_PADRAO_CV'         },
      { id:'sinal',      label:'Recibo de Sinal',            icone:'🧾', cfg:'minuta_sinal',                padrao:'MINUTA_PADRAO_SINAL'       },
      { id:'autorizacao',label:'Autorização de Venda',       icone:'✅', cfg:'minuta_autorizacao',          padrao:'MINUTA_PADRAO_AUTORIZACAO'  },
      { id:'distrato',   label:'Declaração de Distrato',     icone:'⚠️', cfg:'minuta_distrato',            padrao:'MINUTA_PADRAO_DISTRATO'    },
    ];
    const MINUTAS_PADRAO = { MINUTA_PADRAO_CV, MINUTA_PADRAO_SINAL, MINUTA_PADRAO_AUTORIZACAO, MINUTA_PADRAO_DISTRATO };
    function minutaAtual(doc){ return (cfg[doc.cfg]&&String(cfg[doc.cfg]).trim())?cfg[doc.cfg]:MINUTAS_PADRAO[doc.padrao]||''; }

    // Menu suspenso de documentos no detalhe da venda
    function abrirMenuDocs(btnEl, v){
      document.querySelectorAll('.docs-menu').forEach(m=>m.remove());
      const menu=el('<div class="docs-menu" style="position:fixed;background:#fff;border:1px solid var(--bd,#e5e7eb);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.12);padding:6px 0;z-index:9999;min-width:260px"></div>');
      const rect=btnEl.getBoundingClientRect();
      menu.style.top=(rect.bottom+6)+'px'; menu.style.left=rect.left+'px';
      DOCS_BIBLIOTECA.forEach(doc=>{
        const item=el('<button style="display:block;width:100%;text-align:left;padding:10px 16px;border:0;background:0;cursor:pointer;font-size:14px;color:var(--ink,#111)">'+doc.icone+' '+doc.label+'</button>');
        item.onmouseenter=()=>item.style.background='#f3f4f6';
        item.onmouseleave=()=>item.style.background='';
        item.onclick=()=>{ menu.remove(); gerarDocumentoIA(v, doc); };
        menu.appendChild(item);
      });
      // Separador + honorários
      if(cfg.contrato_modelo && String(cfg.contrato_modelo).trim()){
        menu.appendChild(el('<div style="border-top:1px solid #e5e7eb;margin:4px 0"></div>'));
        const hon=el('<button style="display:block;width:100%;text-align:left;padding:10px 16px;border:0;background:0;cursor:pointer;font-size:14px;color:#7c3aed">📋 Contrato de Honorários</button>');
        hon.onmouseenter=()=>hon.style.background='#f5f3ff';
        hon.onmouseleave=()=>hon.style.background='';
        hon.onclick=()=>{ menu.remove(); gerarContrato(v); };
        menu.appendChild(hon);
      }
      document.body.appendChild(menu);
      const fechar=(e)=>{ if(!menu.contains(e.target)&&e.target!==btnEl){ menu.remove(); document.removeEventListener('click',fechar,true); } };
      setTimeout(()=>document.addEventListener('click',fechar,true),50);
    }

    // Biblioteca: tela pra editar as minutas de todos os documentos
    function abrirBiblioteca(){
      const ov=el('<div class="secmodal"></div>');
      let idxAtivo=0;
      function render(){
        ov.innerHTML='';
        const box=el('<div class="secbox" style="max-width:800px"><h3 style="margin:0 0 4px;font-size:18px;font-weight:700">📚 Biblioteca de documentos</h3><div style="font-size:12px;color:var(--mut);margin-bottom:14px">Edite a minuta-base de cada documento. Use {ASSIM} onde a IA deve preencher e [[assim]] para trechos condicionais.</div></div>');
        // abas
        const abas=el('<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap"></div>');
        DOCS_BIBLIOTECA.forEach((doc,i)=>{
          const aba=el('<button class="ghost" style="padding:6px 14px;font-size:13px'+(i===idxAtivo?';background:#eff6ff;border-color:#2563eb;color:#2563eb':'')+'">'+(i===idxAtivo?'✏️ ':'')+doc.icone+' '+doc.label+'</button>');
          aba.onclick=()=>{ idxAtivo=i; render(); };
          abas.appendChild(aba);
        });
        box.appendChild(abas);
        const doc=DOCS_BIBLIOTECA[idxAtivo];
        const ta=el('<textarea class="inp" style="width:100%;height:360px;font-family:monospace;font-size:12px;line-height:1.55;resize:vertical">'+esc(minutaAtual(doc))+'</textarea>');
        box.appendChild(ta);
        const bar=el('<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap"></div>');
        const btRest=el('<button class="ghost" style="padding:8px 14px">↺ Restaurar padrão</button>');
        btRest.onclick=()=>{ if(confirm('Restaurar a minuta padrão de "'+doc.label+'"?')) ta.value=MINUTAS_PADRAO[doc.padrao]||''; };
        const dir=el('<div style="display:flex;gap:8px;flex-wrap:wrap"></div>');
        const btCancel=el('<button class="ghost" style="padding:8px 14px">Fechar</button>');
        btCancel.onclick=()=>ov.remove();
        const btSalvar=el('<button class="btn" style="padding:8px 18px;max-width:140px;background:#6b7280">Salvar minuta</button>');
        btSalvar.onclick=async()=>{
          const txt=ta.value;
          btSalvar.disabled=true; btSalvar.textContent='Salvando…';
          const {error}=await sb.from('secretaria_config').upsert({id:1,[doc.cfg]:txt});
          if(error){ alert('Erro ao salvar: '+error.message); btSalvar.disabled=false; btSalvar.textContent='Salvar minuta'; return; }
          cfg[doc.cfg]=txt; btSalvar.disabled=false; btSalvar.textContent='Salvar minuta';
          const msg=el('<span style="font-size:13px;color:#059669;margin-left:8px">✓ Salvo</span>');
          bar.appendChild(msg); setTimeout(()=>msg.remove(),2000);
        };
        const btGerar=el('<button class="btn" style="padding:8px 18px;max-width:200px">✍️ Gerar '+doc.label+'</button>');
        btGerar.onclick=()=>{ ov.remove(); gerarDocAvulso(doc); };
        dir.appendChild(btCancel); dir.appendChild(btSalvar); dir.appendChild(btGerar);
        bar.appendChild(btRest); bar.appendChild(dir); box.appendChild(bar);
        ov.appendChild(box);
      }
      render();
      document.body.appendChild(ov);
      ov.onclick=(e)=>{ if(e.target===ov) ov.remove(); };
    }

    // Geração AVULSA de documento (sem venda vinculada) — preenche os dados na mão
    function gerarDocAvulso(doc){
      const BACKEND='https://agentes-de-whatsapp-production.up.railway.app';
      const w=topo(doc.icone+' '+doc.label+' — avulso');
      const vb=w.querySelector('#voltar'); vb.textContent='← Biblioteca'; vb.onclick=abrirBiblioteca;
      const box=el('<div class="secbox" style="max-width:760px;margin:0"></div>');
      w.appendChild(box);

      const minuta=minutaAtual(doc);
      let perguntas=[], respostas={}, idx=0, htmlDoc='';
      // dados avulsos digitados pelo usuário
      let dadosAvulsos={};
      const setHTML=(h)=>{ box.innerHTML=h; };

      function erro(msg){ setHTML('<div style="color:#dc2626;font-size:14px">'+esc(msg)+'</div>'); const bt=el('<button class="ghost" style="margin-top:14px;padding:8px 16px">↺ Tentar de novo</button>'); bt.onclick=telaInicial; box.appendChild(bt); }

      // Tela 1: preencher os dados básicos antes de chamar a IA
      function telaInicial(){
        setHTML('<h3 style="margin:0 0 6px;font-size:19px;font-weight:800">'+doc.icone+' '+doc.label+'</h3>'
          +'<div style="font-size:13px;color:var(--mut);margin-bottom:16px">Preencha os dados do documento. A IA vai completar o restante com perguntas.</div>');
        const CAMPOS_AVULSOS=[
          ['cliente',   'Cliente / Comprador(es)','Nome completo ou razão social'],
          ['vendedor',  'Vendedor(es)',            'Nome completo ou razão social'],
          ['imovel',    'Imóvel',                  'Descrição resumida (endereço, tipo, bairro)'],
          ['vgv_txt',   'Valor do negócio (R$)',   'Ex.: 350.000,00'],
          ['obs_extra', 'Observações extras',       'Dados específicos que queira incluir (opcional)'],
        ];
        const form=el('<div class="secform" style="gap:10px;margin-bottom:16px"></div>');
        CAMPOS_AVULSOS.forEach(([k,label,ph])=>{
          const wrap=el('<label style="grid-column:1/3"><span class="secll">'+label+'</span><input class="inp" data-k="'+k+'" placeholder="'+ph+'" value="'+esc(dadosAvulsos[k]||'')+'"></label>');
          wrap.querySelector('input').oninput=(e)=>{ dadosAvulsos[k]=e.target.value; };
          form.appendChild(wrap);
        });
        box.appendChild(form);
        const btGerar=el('<button class="btn" style="padding:10px 22px;max-width:260px">Continuar → montar perguntas</button>');
        btGerar.onclick=iniciar;
        box.appendChild(btGerar);
      }

      // Tela 2: IA monta as perguntas com base na minuta + dados avulsos
      async function iniciar(){
        setHTML('<div style="font-size:14px;color:#2563eb;margin-top:14px">📚 Montando as perguntas com base na minuta…</div>');
        // monta um "resumo de venda" a partir dos dados avulsos
        const dadosVenda={tipo:'Venda',cliente:dadosAvulsos.cliente||'',imovel:dadosAvulsos.imovel||'',vgv:0,comissao:0,_texto_extra:dadosAvulsos.obs_extra||''};
        // participantes sintéticos (pessoa física simples com os dados que o usuário digitou)
        const participantesSint=[];
        if(dadosAvulsos.cliente) participantesSint.push({papel:'comprador',nome:dadosAvulsos.cliente,documento:'',rg:'',nacionalidade:'',estado_civil:'',profissao:'',endereco:'',email:'',telefone:'',creci:'',rep_nome:'',rep_documento:'',rep_rg:'',rep_cargo:''});
        if(dadosAvulsos.vendedor) participantesSint.push({papel:'vendedor',nome:dadosAvulsos.vendedor,documento:'',rg:'',nacionalidade:'',estado_civil:'',profissao:'',endereco:'',email:'',telefone:'',creci:'',rep_nome:'',rep_documento:'',rep_rg:'',rep_cargo:''});
        if(dadosAvulsos.imovel) participantesSint.push({papel:'imovel',nome:dadosAvulsos.imovel,documento:'',rg:'',endereco:'',profissao:'',email:'',telefone:'',creci:'',rep_nome:'',rep_documento:'',rep_rg:'',rep_cargo:''});
        try{
          const r=await fetch(BACKEND+'/secretaria/contrato-perguntas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({minuta,participantes:participantesSint,venda:dadosVenda})});
          const j=await r.json();
          if(!j.ok){ erro('Não consegui montar as perguntas: '+(j.error||'erro')); return; }
          perguntas=Array.isArray(j.perguntas)?j.perguntas:[]; idx=0; respostas={};
          proxima(participantesSint, dadosVenda);
        }catch(e){ erro('Erro: '+e.message); }
      }

      function proxima(parts, dadosV){
        if(idx>=perguntas.length){ adicionais(parts, dadosV); return; }
        const q=perguntas[idx], total=perguntas.length;
        setHTML('<h3 style="margin:0 0 4px;font-size:19px;font-weight:800">'+doc.icone+' '+doc.label+'</h3>'
          +'<div style="font-size:12px;color:var(--mut);margin-bottom:14px">Pergunta '+(idx+1)+' de '+total+'</div>'
          +'<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px 16px;margin-bottom:12px"><div style="font-size:15px;font-weight:600;color:#1e3a8a">'+esc(q.label||'')+'</div>'+(q.dica?'<div style="font-size:12.5px;color:#64748b;margin-top:4px">'+esc(q.dica)+'</div>':'')+'</div>');
        const ta=el('<textarea class="inp" style="width:100%;min-height:80px;resize:vertical" placeholder="Sua resposta… (pode pular)"></textarea>');
        if(respostas[q.id]) ta.value=respostas[q.id];
        box.appendChild(ta);
        const bar=el('<div style="display:flex;justify-content:space-between;gap:10px;margin-top:12px"></div>');
        const btV=el('<button class="ghost" style="padding:9px 14px">← Voltar</button>');
        btV.onclick=()=>{ respostas[q.id]=ta.value.trim(); if(idx>0){idx--;proxima(parts,dadosV);}else telaInicial(); };
        const dir=el('<div style="display:flex;gap:10px"></div>');
        const btP=el('<button class="ghost" style="padding:9px 14px">Pular</button>');
        btP.onclick=()=>{ respostas[q.id]=''; idx++; proxima(parts,dadosV); };
        const btN=el('<button class="btn" style="padding:9px 18px;max-width:200px">'+(idx+1>=total?'Avançar →':'Próxima →')+'</button>');
        btN.onclick=()=>{ respostas[q.id]=ta.value.trim(); idx++; proxima(parts,dadosV); };
        dir.appendChild(btP); dir.appendChild(btN); bar.appendChild(btV); bar.appendChild(dir); box.appendChild(bar);
        try{ ta.focus(); }catch(e){}
      }

      function adicionais(parts, dadosV){
        setHTML('<h3 style="margin:0 0 4px;font-size:19px;font-weight:800">'+doc.icone+' Quase lá</h3>'
          +'<div style="font-size:13px;color:var(--mut);margin-bottom:12px">Alguma observação ou cláusula extra? (pode deixar em branco)</div>');
        const ta=el('<textarea class="inp" style="width:100%;min-height:100px;resize:vertical" placeholder="Ex.: incluir cláusula extra, prazo específico…"></textarea>');
        if(dadosAvulsos.obs_extra) ta.value=dadosAvulsos.obs_extra;
        box.appendChild(ta);
        const msg=el('<div style="font-size:13px;margin:10px 0;min-height:18px"></div>');
        const bar=el('<div style="display:flex;justify-content:space-between;gap:10px;margin-top:8px"></div>');
        const btV=el('<button class="ghost" style="padding:9px 14px">← Voltar</button>');
        btV.onclick=()=>{ if(perguntas.length){idx=perguntas.length-1;proxima(parts,dadosV);}else telaInicial(); };
        if(!perguntas.length) btV.style.visibility='hidden';
        const btG=el('<button class="btn" style="padding:10px 20px;max-width:260px">✍️ Redigir '+doc.label+'</button>');
        btG.onclick=()=>redigir(ta.value.trim(), msg, btG, parts, dadosV);
        bar.appendChild(btV); bar.appendChild(btG); box.appendChild(msg); box.appendChild(bar);
      }

      async function redigir(adic, msg, bt, parts, dadosV){
        bt.disabled=true; msg.style.color='#2563eb'; msg.textContent='✍️ A IA está redigindo o documento…';
        const respArr=perguntas.map(q=>({id:q.id,label:q.label,resposta:respostas[q.id]||''}));
        const adicFull=(adic?adic+'\n':'')+('Valor informado: '+dadosAvulsos.vgv_txt+'. Vendedor(es): '+dadosAvulsos.vendedor+'.');
        try{
          const r=await fetch(BACKEND+'/secretaria/redigir-contrato',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({minuta,participantes:parts,venda:dadosV,respostas:respArr,adicionais:adicFull})});
          const j=await r.json();
          if(!j.ok||!j.html){ msg.style.color='#dc2626'; msg.textContent='Não consegui redigir: '+(j.error||'erro'); bt.disabled=false; return; }
          htmlDoc=j.html; telaFinal(); bt.disabled=false;
        }catch(e){ msg.style.color='#dc2626'; msg.textContent='Erro: '+e.message; bt.disabled=false; }
      }

      function telaFinal(){
        setHTML('<div style="text-align:center;padding:10px 0"><div style="font-size:40px;margin-bottom:8px">✅</div><h3 style="margin:0 0 6px;font-size:19px;font-weight:800">'+doc.label+' redigido!</h3><div style="font-size:13px;color:var(--mut);margin-bottom:22px">Documento avulso gerado pela IA.</div></div>');
        const bts=el('<div style="display:flex;flex-direction:column;gap:10px;max-width:340px;margin:0 auto"></div>');
        const btVer=el('<button class="btn" style="padding:11px 18px;font-size:15px">'+doc.icone+' Abrir e editar</button>');
        btVer.onclick=()=>abrirContratoEditavel(htmlDoc);
        const btWord=el('<button class="ghost" style="padding:10px 18px">📥 Baixar em Word (.doc)</button>');
        btWord.onclick=()=>baixarWord(htmlDoc, doc.label+'-'+dadosAvulsos.cliente);
        const btNovo=el('<button class="ghost" style="padding:10px 18px">↺ Gerar outro</button>');
        btNovo.onclick=()=>{ dadosAvulsos={}; perguntas=[]; respostas={}; idx=0; telaInicial(); };
        const btBib=el('<button class="ghost" style="padding:10px 18px">← Voltar à Biblioteca</button>');
        btBib.onclick=abrirBiblioteca;
        bts.appendChild(btVer); bts.appendChild(btWord); bts.appendChild(btNovo); bts.appendChild(btBib);
        box.appendChild(bts);
      }

      telaInicial();
    }

    // Gerador de documento via IA (generalizado — funciona com qualquer das 4 minutas)
    function gerarDocumentoIA(v, doc){
      const BACKEND='https://agentes-de-whatsapp-production.up.railway.app';
      const w=topo('Gerar: '+doc.label);
      const vb=w.querySelector('#voltar'); vb.textContent='← Detalhe'; vb.onclick=()=>renderDetalhe(v);
      const box=el('<div class="secbox" style="max-width:760px;margin:0"></div>');
      w.appendChild(box);

      // Para o contrato CV, usa o gerador completo com preço editável
      if(doc.id==='cv'){ gerarContratoCV(v); return; }

      const minuta=minutaAtual(doc);
      const dadosVenda={tipo:v.tipo,cliente:v.cliente,imovel:v.imovel,vgv:Number(v.vgv)||0,comissao:Number(v.comissao)||0};
      let participantes=[], perguntas=[], respostas={}, idx=0, htmlDoc='';
      const setHTML=(h)=>{ box.innerHTML=h; };

      // microfone local
      function addMicLocal(inputEl){
        const Rec=window.SpeechRecognition||window.webkitSpeechRecognition; if(!Rec) return null;
        const btn=el('<button type="button" style="width:34px;height:34px;border-radius:8px;border:1px solid var(--bd,#e5e7eb);background:#fff;cursor:pointer;font-size:15px">\ud83c\udfa4</button>');
        let rec=null, ouvindo=false;
        btn.onclick=(e)=>{ e.preventDefault();
          if(ouvindo){ if(rec) rec.stop(); return; }
          rec=new Rec(); rec.lang='pt-BR'; rec.interimResults=true; rec.continuous=true;
          const base=inputEl.value?inputEl.value+' ':''; let finalTxt='';
          rec.onresult=(ev)=>{ let interim=''; for(let i=ev.resultIndex;i<ev.results.length;i++){ const rr=ev.results[i]; if(rr.isFinal) finalTxt+=rr[0].transcript; else interim+=rr[0].transcript; } inputEl.value=base+finalTxt+interim; };
          rec.onend=()=>{ ouvindo=false; btn.textContent='\ud83c\udfa4'; btn.style.background='#fff'; };
          rec.onerror=()=>{ ouvindo=false; btn.textContent='\ud83c\udfa4'; btn.style.background='#fff'; };
          try{ rec.start(); ouvindo=true; btn.textContent='\u23f9'; btn.style.background='#fee2e2'; }catch(err){}
        };
        return btn;
      }

      iniciar();
    }
