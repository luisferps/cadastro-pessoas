    async function fetchAll(){ const { data, error } = await sb.from("financeiro").select("*").order("data",{ascending:true}).order("id",{ascending:true}); if(error) throw error; dados=data||[]; }

    async function carregar(){
      try{ await fetchAll(); renderLista(); }
      catch(e){
        const w=topo("Financeiro");
        w.appendChild(el('<div style="color:#dc2626;font-size:14px;line-height:1.5;margin-top:14px">Não consegui carregar o financeiro. A tabela <b>financeiro</b> já foi criada no Supabase?<br><small>'+esc(e.message||e)+'</small></div>'));
      }
    }

    function topo(titulo){
      app.innerHTML="";
      const w=el('<div class="wrap"></div>');
      w.appendChild(header());
      const back=el('<div class="backbar"><button class="ghost" id="voltar">← Imobiliária</button><span class="pill" style="background:linear-gradient(135deg,#059669,#047857)">'+titulo+'</span></div>');
      back.querySelector("#voltar").onclick=()=>telaModulos("imobiliaria");
      w.appendChild(back); app.appendChild(w); return w;
    }

    function renderLista(){
      const w=topo("Financeiro");
      const anos=[...new Set(dados.map(v=>String(v.data).slice(0,4)))].sort().reverse();
      const inFiltro=(v)=>(fAno==='todos'||String(v.data).slice(0,4)===fAno)&&(fMes==='todos'||String(v.data).slice(5,7)===fMes);
      const base=dados.filter(inFiltro);
      const entradas=base.filter(v=>Number(v.valor)>0).reduce((s,v)=>s+Number(v.valor),0);
      const saidas=base.filter(v=>Number(v.valor)<0).reduce((s,v)=>s+Number(v.valor),0);
      const resultado=entradas+saidas;
      let fimPeriodo='9999-12-31';
      if(fAno!=='todos'){ const mm=fMes!=='todos'?fMes:'12'; const ultDia=new Date(Number(fAno),Number(mm),0).getDate(); fimPeriodo=fAno+'-'+mm+'-'+String(ultDia).padStart(2,'0'); }
      const saldoAcum=dados.filter(v=>String(v.data)<=fimPeriodo).reduce((s,v)=>s+Number(v.valor||0),0);
      const anoG=fAno!=='todos'?fAno:(anos[0]||String(new Date().getFullYear()));
      const pm=Array(12).fill(0);
      dados.filter(v=>String(v.data).slice(0,4)===anoG).forEach(v=>{pm[Number(String(v.data).slice(5,7))-1]+=Number(v.valor||0);});
      const maxAbs=Math.max(1,...pm.map(x=>Math.abs(x)));

      let html='<div class="secfiltros">';
      html+='<select id="fAno" class="inp secsel"><option value="todos">Todos os anos</option>'+anos.map(a=>'<option value="'+a+'"'+(fAno===a?' selected':'')+'>'+a+'</option>').join('')+'</select>';
      html+='<select id="fMes" class="inp secsel"><option value="todos">Todos os meses</option>'+MESES.map((m,i)=>{const mm=String(i+1).padStart(2,'0');return '<option value="'+mm+'"'+(fMes===mm?' selected':'')+'>'+m+'</option>';}).join('')+'</select>';
      html+='<div style="flex:1"></div>';
      html+='<div style="display:flex;gap:6px"><button id="vExtrato" class="ghost" style="padding:7px 14px;font-size:13px'+(fVista==='extrato'?';background:#eff6ff;border-color:#2563eb;color:#2563eb':'')+'">📋 Extrato</button>';
      html+='<button id="vMensal" class="ghost" style="padding:7px 14px;font-size:13px'+(fVista==='mensal'?';background:#eff6ff;border-color:#2563eb;color:#2563eb':'')+'">📅 Mensal</button>';
      html+='<button id="vCategoria" class="ghost" style="padding:7px 14px;font-size:13px'+(fVista==='categoria'?';background:#eff6ff;border-color:#2563eb;color:#2563eb':'')+'">🏷️ Categoria</button></div>';
      html+='<button id="novo" class="btn" style="max-width:140px">+ Novo</button></div>';

      // cards de resumo
      html+='<div class="secgrid2">';
      html+='<div class="seccard"><div class="secl">Entradas</div><div class="secv2" style="color:#059669">'+BRL(entradas)+'</div></div>';
      html+='<div class="seccard"><div class="secl">Saídas</div><div class="secv2" style="color:#dc2626">−'+BRL(Math.abs(saidas))+'</div></div>';
      html+='<div class="seccard"><div class="secl">Resultado do período</div><div class="secv2" style="color:'+(resultado>=0?'#059669':'#dc2626')+'">'+BRL(resultado)+'</div></div>';
      html+='<div class="seccard"><div class="secl">Saldo acumulado</div><div class="secv2" style="color:'+(saldoAcum>=0?'#0E79B4':'#dc2626')+'">'+BRL(saldoAcum)+'</div></div>';
      html+='</div>';

      // gráfico
      html+='<div class="sech3">Resultado por mês · '+anoG+'</div><div class="secchart">';
      pm.forEach((v,i)=>{const cor=v>0?'linear-gradient(180deg,#34d399,#059669)':(v<0?'linear-gradient(180deg,#f87171,#dc2626)':'#eef2f7'); html+='<div class="secbar"><div class="secbari" title="'+(v>=0?'':'−')+BRL(Math.abs(v))+'" style="height:'+Math.max(2,Math.round(Math.abs(v)/maxAbs*120))+'px;background:'+cor+'"></div><div class="secbarl">'+MESES[i]+'</div></div>';});
      html+='</div>';

      if(fVista==='extrato'){
        html+='<div class="sech3">Lançamentos <span style="font-weight:500;color:var(--mut);font-size:12px">· clique numa linha pra editar</span></div><div style="overflow-x:auto"><table class="sectab"><thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Origem</th><th class="r">Valor</th><th></th></tr></thead><tbody>';
        if(!base.length) html+='<tr><td colspan="6" style="text-align:center;padding:36px;color:#9ca3af">Nenhum lançamento no filtro.</td></tr>';
        base.slice().reverse().forEach(v=>{
          const val=Number(v.valor)||0;
          const origBadge=v.origem&&v.origem!=='manual'?'<span class="sectag" style="background:#ede9fe;color:#7c3aed;font-size:11px">'+esc(v.origem)+'</span>':'';
          html+='<tr class="secrow" data-id="'+v.id+'"><td>'+fmtD(v.data)+'</td>'+
            '<td style="font-weight:600">'+esc(v.descricao||'—')+'</td>'+
            '<td style="color:#6b7280">'+esc(v.categoria||'—')+'</td>'+
            '<td>'+origBadge+'</td>'+
            '<td class="r" style="font-weight:700;color:'+(val>=0?'#059669':'#dc2626')+'">'+(val>=0?'':'−')+BRL(Math.abs(val))+'</td>'+
            '<td class="r" style="color:#c2c8d4;font-size:18px">›</td></tr>';
        });
        html+='</tbody></table></div>';

      } else if(fVista==='mensal'){
        // DRE simplificado: agrupa por mês do período filtrado (ou todos os meses do ano)
        const dadosMes=fAno==='todos'?dados:dados.filter(v=>String(v.data).slice(0,4)===fAno);
        const mesesExist=[...new Set(dadosMes.map(v=>String(v.data).slice(0,7)))].sort().reverse();
        html+='<div class="sech3">Resumo mensal</div><div style="overflow-x:auto"><table class="sectab"><thead><tr><th>Mês</th><th class="r">Entradas</th><th class="r">Saídas</th><th class="r">Resultado</th><th class="r">Saldo acum.</th></tr></thead><tbody>';
        if(!mesesExist.length) html+='<tr><td colspan="5" style="text-align:center;padding:36px;color:#9ca3af">Nenhum lançamento.</td></tr>';
        let saldoCorrente=0;
        // calcula saldo até antes do primeiro mês exibido
        if(mesesExist.length){
          const primMes=mesesExist[mesesExist.length-1]; // o mais antigo
          saldoCorrente=dados.filter(v=>String(v.data).slice(0,7)<primMes).reduce((s,v)=>s+Number(v.valor||0),0);
        }
        mesesExist.slice().reverse().forEach(mes=>{
          const doMes=dadosMes.filter(v=>String(v.data).slice(0,7)===mes);
          const ent=doMes.filter(v=>Number(v.valor)>0).reduce((s,v)=>s+Number(v.valor),0);
          const sai=doMes.filter(v=>Number(v.valor)<0).reduce((s,v)=>s+Number(v.valor),0);
          const res=ent+sai; saldoCorrente+=res;
          const [ano,mm]=mes.split('-'); const nomeMes=MESES[Number(mm)-1]+'/'+ano;
          html+='<tr><td style="font-weight:600">'+nomeMes+'</td>'+
            '<td class="r" style="color:#059669">'+BRL(ent)+'</td>'+
            '<td class="r" style="color:#dc2626">−'+BRL(Math.abs(sai))+'</td>'+
            '<td class="r" style="font-weight:700;color:'+(res>=0?'#059669':'#dc2626')+'">'+BRL(res)+'</td>'+
            '<td class="r" style="color:'+(saldoCorrente>=0?'#0E79B4':'#dc2626')+'">'+BRL(saldoCorrente)+'</td></tr>';
        });
        html+='</tbody></table></div>';

      } else if(fVista==='categoria'){
        const porCat={};
        base.forEach(v=>{ const c=v.categoria||'Sem categoria'; if(!porCat[c]) porCat[c]={ent:0,sai:0}; const val=Number(v.valor)||0; if(val>0) porCat[c].ent+=val; else porCat[c].sai+=val; });
        const cats=Object.keys(porCat).sort();
        html+='<div class="sech3">Por categoria</div><div style="overflow-x:auto"><table class="sectab"><thead><tr><th>Categoria</th><th class="r">Entradas</th><th class="r">Saídas</th><th class="r">Líquido</th></tr></thead><tbody>';
        if(!cats.length) html+='<tr><td colspan="4" style="text-align:center;padding:36px;color:#9ca3af">Nenhum lançamento no filtro.</td></tr>';
        cats.forEach(c=>{
          const {ent,sai}=porCat[c], liq=ent+sai;
          html+='<tr><td style="font-weight:600">'+esc(c)+'</td>'+
            '<td class="r" style="color:#059669">'+(ent?BRL(ent):'—')+'</td>'+
            '<td class="r" style="color:#dc2626">'+(sai?'−'+BRL(Math.abs(sai)):'—')+'</td>'+
            '<td class="r" style="font-weight:700;color:'+(liq>=0?'#059669':'#dc2626')+'">'+BRL(liq)+'</td></tr>';
        });
        html+='</tbody></table></div>';
      }

      const cont=el('<div></div>'); cont.innerHTML=html; w.appendChild(cont);
      cont.querySelector("#fAno").onchange=(e)=>{fAno=e.target.value;renderLista();};
      cont.querySelector("#fMes").onchange=(e)=>{fMes=e.target.value;renderLista();};
      cont.querySelector("#vExtrato").onclick=()=>{fVista='extrato';renderLista();};
      cont.querySelector("#vMensal").onclick=()=>{fVista='mensal';renderLista();};
      cont.querySelector("#vCategoria").onclick=()=>{fVista='categoria';renderLista();};
      cont.querySelector("#novo").onclick=()=>abrirEditor(vazio());
      cont.querySelectorAll(".secrow").forEach(tr=>tr.onclick=()=>{const v=dados.find(x=>String(x.id)===tr.dataset.id); if(v) abrirEditor(Object.assign({},v));});
    }

    function abrirEditor(v){
      const f=Object.assign({},v);
      const tipoIni=(Number(f.valor)||0)<0?'Saída':'Entrada';
      const absVal=f.valor===''||f.valor==null?'':Math.abs(Number(f.valor)||0);
      const ov=el('<div class="secmodal"></div>');
      let catsAtivas=tipoIni==='Entrada'?CATS_ENTRADA:CATS_SAIDA;
      function buildCats(tipo){ return (tipo==='Entrada'?CATS_ENTRADA:CATS_SAIDA).map(c=>'<option value="'+esc(c)+'"'+(f.categoria===c?' selected':'')+'>'+esc(c)+'</option>').join(''); }
      ov.innerHTML='<div class="secbox" style="max-width:480px"><h3 style="margin:0 0 4px;font-size:18px;font-weight:700">'+(v.id?'Editar lançamento':'Novo lançamento')+'</h3>'+
        '<div style="font-size:12px;color:var(--mut);margin-bottom:14px">Entrada soma no caixa; Saída subtrai.</div>'+
        '<div class="secform">'+
        '<label><span class="secll">Data</span><input class="inp" data-k="data" type="date" value="'+esc(f.data||'')+'"/></label>'+
        '<label><span class="secll">Tipo</span><select class="inp" data-k="tipo"><option value="Entrada"'+(tipoIni==='Entrada'?' selected':'')+'>Entrada (+)</option><option value="Saída"'+(tipoIni==='Saída'?' selected':'')+'>Saída (−)</option></select></label>'+
        '<label style="grid-column:1/3"><span class="secll">Descrição</span><input class="inp" data-k="descricao" type="text" value="'+esc(f.descricao||'')+'" placeholder="Ex.: Comissão venda Silva, Aluguel escritório…"/></label>'+
        '<label><span class="secll">Valor (R$)</span><input class="inp" data-k="valor" type="number" step="0.01" min="0" value="'+esc(absVal)+'"/></label>'+
        '<label><span class="secll">Categoria</span><select class="inp" data-k="categoria"><option value="">— selecione —</option>'+buildCats(tipoIni)+'</select></label>'+
        '</div>'+
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:18px">'+
        (v.id?'<button class="btdel" id="del" style="padding:8px 16px">Excluir</button>':'<span></span>')+
        '<div style="display:flex;gap:10px"><button class="ghost" id="cancel">Cancelar</button><button class="btn" id="salvar" style="max-width:160px">Salvar</button></div></div></div>';
      document.body.appendChild(ov);
      // atualiza categorias ao trocar tipo
      ov.querySelector('[data-k="tipo"]').onchange=(e)=>{
        const sel=ov.querySelector('[data-k="categoria"]');
        sel.innerHTML='<option value="">— selecione —</option>'+(e.target.value==='Entrada'?CATS_ENTRADA:CATS_SAIDA).map(c=>'<option value="'+esc(c)+'">'+esc(c)+'</option>').join('');
      };
      const fechar=()=>ov.remove();
      ov.onclick=(e)=>{ if(e.target===ov) fechar(); };
      ov.querySelector("#cancel").onclick=fechar;
      const del=ov.querySelector("#del");
      if(del) del.onclick=async()=>{
        if(!window.confirm('Excluir este lançamento? Não dá pra desfazer.')) return;
        const { error } = await sb.from("financeiro").delete().eq("id",v.id);
        if(error){ alert('Erro ao excluir: '+error.message); return; }
        fechar(); await fetchAll(); renderLista();
      };
      ov.querySelector("#salvar").onclick=async()=>{
        const g=(k)=>ov.querySelector('[data-k="'+k+'"]').value;
        const data=g("data"), descricao=(g("descricao")||'').trim(), tipo=g("tipo");
        const absN=Math.abs(Number(g("valor"))||0), categoria=(g("categoria")||'').trim();
        if(!data){ alert('Informe a data.'); return; }
        if(!descricao){ alert('Informe a descrição.'); return; }
        if(!absN){ alert('Informe um valor maior que zero.'); return; }
        if(!categoria){ alert('Selecione uma categoria.'); return; }
        const valor=tipo==='Saída'?-absN:absN;
        const payload={ data, descricao, valor, categoria, origem:f.origem||'manual' };
        const btn=ov.querySelector("#salvar"); btn.disabled=true; btn.textContent="Salvando…";
        let error;
        if(v.id){ ({ error } = await sb.from("financeiro").update(payload).eq("id",v.id)); }
        else { ({ error } = await sb.from("financeiro").insert(payload)); }
        if(error){ alert('Erro ao salvar: '+error.message+'\n\nVocê rodou o SQL do financeiro?'); btn.disabled=false; btn.textContent="Salvar"; return; }
        fechar(); await fetchAll(); renderLista();
      };
    }

    carregar();
  }


  (async ()=>{
    // SSO via ?jwt= (vindo do Portal com ssojwt:true)
    try{
      const params = new URLSearchParams(location.search);
      const jwtParam = params.get('jwt');
      if(jwtParam){
        // Tenta usar o JWT como access_token (sem refresh_token)
        const { data, error } = await sb.auth.setSession({ access_token: jwtParam, refresh_token: '' });
        if(!error && data && data.session && data.session.user){
          history.replaceState({}, '', location.pathname); // limpa ?jwt= da URL
          await carregarPerfil(data.session.user);
          return;
        }
      }
    }catch(e){}
    // Sessão existente no navegador
    try{
      const { data } = await sb.auth.getSession();
      if(data && data.session && data.session.user){ await carregarPerfil(data.session.user); return; }
    }catch(e){}
    telaLogin();
  })();
</script>
</body>
</html>
